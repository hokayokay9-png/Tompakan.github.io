<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tompakan</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:600px;
}

h1{
    font-size:60px;
    margin-bottom:30px;
}

input{
    width:70%;
    padding:15px;
    font-size:22px;
    border:none;
    border-radius:12px;
}

button{
    padding:15px 25px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#result{
    margin-top:40px;
    font-size:28px;
}
</style>
</head>
<body>

<div class="container">

    <h1>Tompakan</h1>

    <input type="text" id="code" placeholder="Enter your name">
    <button onclick="checkCode()">Submit</button>

    <div id="result"></div>

</div>

<script>
function checkCode() {

    const input = document.getElementById("code")
        .value
        .trim()
        .toLowerCase();

    const result = document.getElementById("result");

    const validNames = [
        "zuriel",
        "sibon",
        "rheen li",
        "jowens",
        "jeric",
        "arnel",
        "klinton",
        "nysun"
    ];

    if(validNames.includes(input)){

        result.innerHTML = `
            <h2>😂 LOKDIT MO!</h2>

            <p>from pinaka poging nyong tropa 😎</p>

            <br>

            <p style="font-size:18px;">
                Created by Earl
            </p>
        `;

    } else {

        result.innerHTML = `
            <h2>❌ Invalid Name</h2>
            <p>Try again.</p>
        `;
    }
}
</script>

</body>
</html>
